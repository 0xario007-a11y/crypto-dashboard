API Layer
Cache System
Coin Data Loader

<script>


/*

API REQUEST SYSTEM

Flow:

1- Check LocalStorage
2- Show cached data
3- Update from Worker
4- Save new cache


*/


const CACHE_KEY =
"crypto_dashboard_"+CONFIG.coin;




function getCache(){


const cached =
localStorage.getItem(
CACHE_KEY
);



if(!cached)
return null;



return JSON.parse(cached);



}





function saveCache(data){


localStorage.setItem(

CACHE_KEY,

JSON.stringify({

time:Date.now(),

data:data

})

);


}




function isCacheValid(cache){


if(!cache)
return false;



return (
Date.now()
-
cache.time
<
CONFIG.cacheTime
);


}





async function fetchCoinData(){


const cached =
getCache();



if(
cached &&
isCacheValid(cached)
){


renderCoinData(
cached.data
);



updateFromAPI();



return;


}



await updateFromAPI();



}





async function updateFromAPI(){



try{


const response =
await fetch(

`${CONFIG.workerURL}?coin=${CONFIG.coin}`

);



if(!response.ok)
throw new Error(
"API Error"
);



const data =
await response.json();



coinData=data;



saveCache(data);



renderCoinData(data);



}

catch(error){


console.error(
error
);


showError();


}


}





function showError(){


document.getElementById(
"dashboard"
)
.innerHTML=
`

<div class="loading">

Unable to load data

</div>

`;


}





async function init(){


console.log(
"Dashboard Start:",
CONFIG.coin
);



await fetchCoinData();



}





</script>

<script>


let currentTimeframe = "24H";



const TIMEFRAMES = {


"24H":"24h",

"7D":"7d",

"30D":"30d",

"90D":"90d",

"1Y":"1y"


};






async function loadChartData(){


try{


const response =
await fetch(

`${CONFIG.workerURL}/chart?coin=${CONFIG.coin}&range=${TIMEFRAMES[currentTimeframe]}`

);



if(!response.ok)
throw new Error(
"Chart API Error"
);



const data =
await response.json();



renderChart(data);



}

catch(error){


console.error(
"Chart Error:",
error
);


}


}





function renderChart(data){


const ctx =
document
.getElementById(
"priceChart"
);



if(chart)
chart.destroy();




chart =
new Chart(
ctx,
{


type:"candlestick",


data:{


datasets:[

{


label:
CONFIG.coin
.toUpperCase(),


data:data.map(
(item)=>
({


x:
new Date(item.time),


o:item.open,


h:item.high,


l:item.low,


c:item.close



})

),



borderColor:
"#38bdf8"



}

]


},



options:{


responsive:true,


maintainAspectRatio:false,



animation:{


duration:800


},



plugins:{


legend:{


display:true,


labels:{


color:"#ffffff"


}


},



tooltip:{


mode:"index",


intersect:false


}


},



scales:{


x:{


type:"time",



time:{


tooltipFormat:
"DD MMM YYYY"


},



ticks:{


color:"#94a3b8"


}



},



y:{


ticks:{


color:"#94a3b8",


callback:function(value){


return "$"+
value.toLocaleString();


}


}


}



}



}


}

);



}







function addTimeframeButtons(){


const chartBox =
document.querySelector(
".chart-box"
);



if(!chartBox)
return;



const buttons =

`

<div style="
display:flex;
gap:10px;
margin-bottom:20px;

">


${Object.keys(TIMEFRAMES)
.map(

tf =>

`

onclick="changeTimeframe('${tf}')"

style="
background:#1e293b;
color:white;
border:0;
padding:10px 18px;
border-radius:10px;

">

</button>

`

).join("")}


</div>

`;



chartBox.insertAdjacentHTML(

}





async function changeTimeframe(tf){


currentTimeframe=tf;


await loadChartData();


}





const oldRenderCoinData =

renderCoinData=function(data){

},100);



};





</script>

<script>


function safeValue(value){


if(
value === null ||
value === undefined ||
value === ""
)

return "-";


return value;


}






function formatCompact(value){


if(!value)
return "-";


return Intl.NumberFormat(
"en",
{

notation:"compact",

maximumFractionDigits:2

}

)
.format(value);


}





function formatPercent(value){


if(
value === null ||
value === undefined
)

return "-";



return Number(value)
.toFixed(2)
+
"%";


}





function updateLastSync(){



const element =
document.getElementById(
"lastSync"
);



if(element){


element.innerText =
new Date()
.toLocaleTimeString();


}



}





async function safeFetch(url){



try{


const response =
await fetch(url);



if(
!response.ok
)

throw new Error(
response.status
);



return await response.json();



}

catch(error){


console.error(
"Request failed:",
error
);



return null;



}



}







function validateCoinResponse(data){



if(
!data ||
!data.coin ||
!data.market
)

return false;



return true;



}





async function updateFromAPI(){



const data =
await safeFetch(

`${CONFIG.workerURL}?coin=${CONFIG.coin}`

);



if(
!validateCoinResponse(data)
){


showError();


return;


}



coinData=data;



saveCache(data);



renderCoinData(data);



updateLastSync();



}





async function updateChartFromAPI(){



const data =
await safeFetch(

`${CONFIG.workerURL}/chart?coin=${CONFIG.coin}&range=${TIMEFRAMES[currentTimeframe]}`

);



if(
!data ||
!Array.isArray(data)
)

return;



saveChartCache(data);



renderChart(data);



}






</script>
