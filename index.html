<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bitcoin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f172a;
font-family:Arial,sans-serif;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.stats{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;

}

.card{

background:#1e293b;
padding:22px;
border-radius:15px;
box-shadow:0 0 12px rgba(0,0,0,.25);

}

.label{

font-size:14px;
color:#94a3b8;
margin-bottom:10px;

}

.value{

font-size:30px;
font-weight:bold;

}

.green{

color:#22c55e;

}

.red{

color:#ef4444;

}

.chart{

width:100%;
height:700px;
border-radius:15px;
overflow:hidden;

}

@media(max-width:768px){

body{

padding:10px;

}

.chart{

height:500px;

}

.value{

font-size:24px;

}

}

</style>

</head>

<body>

<h1>₿ Bitcoin Dashboard</h1>

<div class="stats">

<div class="card">

<div class="label">Price</div>

<div id="price" class="value">Loading...</div>

</div>

<div class="card">

<div class="label">24H Volume</div>

<div id="volume" class="value">Loading...</div>

</div>

<div class="card">

<div class="label">24H Change</div>

<div id="change" class="value">Loading...</div>

</div>

<div class="card">

<div class="label">Market Cap</div>

<div id="marketcap" class="value">Loading...</div>

</div>

<div class="card">

<div class="label">Circulating Supply</div>

<div id="supply" class="value">Loading...</div>

</div>

</div>

<div class="chart">

<div class="tradingview-widget-container">

<div id="tradingview_btc"></div>

</div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>

new TradingView.widget({

width:"100%",

height:700,

symbol:"BINANCE:BTCUSDT",

interval:"240",

timezone:"Etc/UTC",

theme:"dark",

style:"1",

locale:"en",

toolbar_bg:"#0f172a",

enable_publishing:false,

allow_symbol_change:true,

container_id:"tradingview_btc"

});

async function loadBTC(){

try{

const r=await fetch("https://api.coingecko.com/api/v3/coins/bitcoin");

const d=await r.json();

document.getElementById("price").innerHTML=
"$"+d.market_data.current_price.usd.toLocaleString();

document.getElementById("volume").innerHTML=
"$"+Math.round(d.market_data.total_volume.usd).toLocaleString();

const change=d.market_data.price_change_percentage_24h;

document.getElementById("change").innerHTML=
change.toFixed(2)+"%";

document.getElementById("change").className=
"value "+(change>=0?"green":"red");

document.getElementById("marketcap").innerHTML=
"$"+Math.round(d.market_data.market_cap.usd).toLocaleString();

document.getElementById("supply").innerHTML=
Math.round(d.market_data.circulating_supply).toLocaleString()+" BTC";

}catch(e){

console.log(e);

}

}

loadBTC();

setInterval(loadBTC,30000);

</script>

</body>

</html>
