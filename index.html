<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bitcoin Dashboard</title>

<style>
body{
    margin:0;
    background:#111827;
    font-family:Arial,sans-serif;
    color:white;
}

h2{
    text-align:center;
    margin-top:20px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:40px;
    margin:25px 0;
    flex-wrap:wrap;
}

.card{
    background:#1f2937;
    padding:20px 35px;
    border-radius:12px;
    text-align:center;
    min-width:220px;
}

.label{
    color:#9ca3af;
    font-size:15px;
}

.value{
    font-size:30px;
    margin-top:10px;
    font-weight:bold;
}

.chart{
    width:95%;
    height:700px;
    margin:auto;
}
</style>

</head>

<body>

<h2>Bitcoin Dashboard</h2>

<div class="stats">

<div class="card">
<div class="label">BTC Price</div>
<div class="value" id="price">Loading...</div>
</div>

<div class="card">
<div class="label">24H Volume</div>
<div class="value" id="volume">Loading...</div>
</div>

</div>

<div class="chart">
<div class="tradingview-widget-container">
<div id="tradingview_btc"></div>
</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
width:"100%",
height:700,
symbol:"BINANCE:BTCUSDT",
interval:"240",
timezone:"Etc/UTC",
theme:"dark",
style:"1",
locale:"en",
toolbar_bg:"#111827",
enable_publishing:false,
allow_symbol_change:true,
container_id:"tradingview_btc"
});

async function loadBTC(){

const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_vol=true");

const d = await r.json();

document.getElementById("price").innerHTML =
"$"+d.bitcoin.usd.toLocaleString();

document.getElementById("volume").innerHTML =
"$"+Math.round(d.bitcoin.usd_24h_vol).toLocaleString();

}

loadBTC();

setInterval(loadBTC,60000);
</script>

</body>
</html>
