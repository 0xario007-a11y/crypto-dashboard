<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="theme-color" content="#0b1120">

<title>Crypto Dashboard</title>

<link rel="preconnect" href="https://api.coingecko.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://api.coingecko.com">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{

--bg:#0b1120;
--surface:#121a2b;
--surface-2:#182235;
--border:#243149;
--text:#f8fafc;
--muted:#94a3b8;

--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--cyan:#06b6d4;
--purple:#8b5cf6;

--radius:18px;

--shadow:
0 10px 30px rgba(0,0,0,.25);

--transition:.25s ease;

--max-width:1320px;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

background:linear-gradient(
180deg,
#0b1120 0%,
#0d1425 100%
);

color:var(--text);

font-family:
Inter,
Segoe UI,
Roboto,
Arial,
sans-serif;

min-height:100vh;

-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;

}

img{
display:block;
max-width:100%;
}

button{
font:inherit;
cursor:pointer;
}

canvas{
display:block;
width:100%;
}

.container{

max-width:var(--max-width);

margin:auto;

padding:

28px
20px
48px;

}

.header{

display:flex;

align-items:center;

justify-content:space-between;

gap:24px;

margin-bottom:28px;

flex-wrap:wrap;

}

.brand{

display:flex;

align-items:center;

gap:18px;

}

.logo{

width:72px;

height:72px;

border-radius:50%;

background:var(--surface);

border:1px solid var(--border);

overflow:hidden;

display:flex;

align-items:center;

justify-content:center;

box-shadow:var(--shadow);

}

.logo img{

width:56px;

height:56px;

object-fit:contain;

}

.title-group{

display:flex;

flex-direction:column;

gap:6px;

}

.coin-name{

font-size:2rem;

font-weight:700;

letter-spacing:-.03em;

}

.coin-symbol{

font-size:.9rem;

color:var(--muted);

text-transform:uppercase;

letter-spacing:.12em;

}

.status{

display:flex;

align-items:center;

gap:12px;

flex-wrap:wrap;

}

.badge{

display:flex;

align-items:center;

gap:8px;

padding:

10px
16px;

background:var(--surface);

border:1px solid var(--border);

border-radius:999px;

font-size:.9rem;

color:var(--muted);

}

.badge-dot{

width:8px;

height:8px;

border-radius:50%;

background:var(--green);

box-shadow:
0 0 8px var(--green);

animation:pulse 1.8s infinite;

}

@keyframes pulse{

0%{

transform:scale(.95);
opacity:.7;

}

70%{

transform:scale(1.4);
opacity:0;

}

100%{

transform:scale(.95);
opacity:.7;

}

}

.grid{

display:grid;

grid-template-columns:
repeat(12,minmax(0,1fr));

gap:20px;

}

.card{

background:

linear-gradient(
180deg,
rgba(255,255,255,.02),
rgba(255,255,255,.01)
),

var(--surface);

border:1px solid var(--border);

border-radius:var(--radius);

box-shadow:var(--shadow);

transition:var(--transition);

overflow:hidden;

position:relative;

}

.card:hover{

transform:translateY(-4px);

border-color:#2f4265;

}

.card-header{

padding:

20px
22px
10px;

display:flex;

justify-content:space-between;

align-items:center;

}

.card-title{

font-size:.9rem;

color:var(--muted);

font-weight:600;

letter-spacing:.05em;

text-transform:uppercase;

}

.card-body{

padding:

0
22px
22px;

}

.metric{

display:flex;

flex-direction:column;

gap:8px;

}

.metric-value{

font-size:2rem;

font-weight:700;

letter-spacing:-.04em;

}

.metric-label{

font-size:.82rem;

color:var(--muted);

}

.positive{

color:var(--green);

}

.negative{

color:var(--red);

}

.price-card{

grid-column:span 4;

}

.change-card{

grid-column:span 2;

}

.rank-card{

grid-column:span 2;

}

.marketcap-card{

grid-column:span 4;

}

.chart-card{

grid-column:span 12;

padding-bottom:10px;

}

.chart-toolbar{

display:flex;

gap:10px;

flex-wrap:wrap;

padding:

0
22px
20px;

}

.range-btn{

background:transparent;

border:1px solid var(--border);

color:var(--muted);

padding:

9px
16px;

border-radius:999px;

transition:var(--transition);

}

.range-btn:hover{

border-color:var(--blue);

color:white;

}

.range-btn.active{

background:var(--blue);

border-color:var(--blue);

color:white;

}

.chart-wrapper{

position:relative;

height:420px;

padding:

0
18px
18px;

}

.stats{

grid-column:span 12;

display:grid;

grid-template-columns:
repeat(4,minmax(0,1fr));

gap:20px;

}

.stat-card{

min-height:130px;

}

.stat-grid{

display:grid;

grid-template-columns:
repeat(2,minmax(0,1fr));

gap:18px;

}

.stat{

display:flex;

flex-direction:column;

gap:8px;

}

.stat-name{

font-size:.8rem;

color:var(--muted);

text-transform:uppercase;

letter-spacing:.08em;

}

.stat-value{

font-size:1rem;

font-weight:600;

word-break:break-word;

}

.skeleton{

position:relative;

overflow:hidden;

background:#1b2940;

border-radius:10px;

}

.skeleton::after{

content:"";

position:absolute;

top:0;

left:-150%;

width:150%;

height:100%;

background:

linear-gradient(
90deg,
transparent,
rgba(255,255,255,.08),
transparent
);

animation:loading 1.4s infinite;

}

@keyframes loading{

100%{

left:150%;

}

}

.loading-line{

height:18px;

margin-bottom:12px;

}

.loading-lg{

height:42px;

margin-top:6px;

}

@media(max-width:1100px){

.price-card,
.marketcap-card,
.change-card,
.rank-card{

grid-column:span 6;

}

.stats{

grid-template-columns:
repeat(2,minmax(0,1fr));

}

}

@media(max-width:768px){

.container{

padding:18px;

}

.grid{

gap:16px;

}

.price-card,
.marketcap-card,
.change-card,
.rank-card,
.chart-card{

grid-column:span 12;

}

.stats{

grid-template-columns:1fr;

}

.stat-grid{

grid-template-columns:1fr;

}

.chart-wrapper{

height:340px;

}

.coin-name{

font-size:1.5rem;

}

}

</style>
</head>
<body>

<div class="container">

<header class="header">

<div class="brand">

<div class="logo">
<img
id="coinLogo"
alt=""
src=""
>
</div>

<div class="title-group">

<h1
class="coin-name"
id="coinName"
></h1>

<div
class="coin-symbol"
id="coinSymbol"
></div>

</div>

</div>

<div class="status">

<div class="badge">

<div class="badge-dot"></div>

<span>Live</span>

</div>

<div
class="badge"
id="lastUpdatedBadge"
></div>

</div>

</header>

<section class="grid">

<div class="card price-card">

<div class="card-header">

<div class="card-title">
Price
</div>

</div>

<div class="card-body">

<div class="metric">

<div
class="metric-value"
id="price"
></div>

<div
class="metric-label"
id="priceLoading"
>

<div class="skeleton loading-line"></div>
<div class="skeleton loading-lg"></div>

</div>

</div>

</div>

</div>

<div class="card change-card">

<div class="card-header">

<div class="card-title">
24H
</div>

</div>

<div class="card-body">

<div
class="metric-value"
id="change24"
></div>

</div>

</div>

<div class="card rank-card">

<div class="card-header">

<div class="card-title">
Rank
</div>

</div>

<div class="card-body">

<div
class="metric-value"
id="rank"
></div>

</div>

</div>

<div class="card marketcap-card">

<div class="card-header">

<div class="card-title">
Market Cap
</div>

</div>

<div class="card-body">

<div
class="metric-value"
id="marketCap"
></div>

</div>

</div>

<div class="card chart-card">

<div class="card-header">

<div class="card-title">
Price Chart
</div>

</div>

<div class="chart-toolbar">

<button class="range-btn active" data-days="1">24H</button>
<button class="range-btn" data-days="7">7D</button>
<button class="range-btn" data-days="30">30D</button>
<button class="range-btn" data-days="90">90D</button>
<button class="range-btn" data-days="365">1Y</button>

</div>

<div class="chart-wrapper">

<canvas id="priceChart"></canvas>

</div>

</div>

<div class="stats">

    <div class="card stat-card">

<div class="card-header">

<div class="card-title">
Market Data
</div>

</div>

<div class="card-body">

<div class="stat-grid">

<div class="stat">

<div class="stat-name">
FDV
</div>

<div
class="stat-value"
id="fdv"
></div>

</div>

<div class="stat">

<div class="stat-name">
24H Volume
</div>

<div
class="stat-value"
id="volume"
></div>

</div>

<div class="stat">

<div class="stat-name">
Circulating Supply
</div>

<div
class="stat-value"
id="circulating"
></div>

</div>

<div class="stat">

<div class="stat-name">
Total Supply
</div>

<div
class="stat-value"
id="totalSupply"
></div>

</div>

</div>

</div>

</div>

<div class="card stat-card">

<div class="card-header">

<div class="card-title">
All Time
</div>

</div>

<div class="card-body">

<div class="stat-grid">

<div class="stat">

<div class="stat-name">
ATH
</div>

<div
class="stat-value"
id="ath"
></div>

</div>

<div class="stat">

<div class="stat-name">
ATL
</div>

<div
class="stat-value"
id="atl"
></div>

</div>

<div class="stat">

<div class="stat-name">
Updated
</div>

<div
class="stat-value"
id="updated"
></div>

</div>

<div class="stat">

<div class="stat-name">
Refresh
</div>

<div
class="stat-value"
id="refreshStatus"
>
30 Seconds
</div>

</div>

</div>

</div>

</div>

</div>

</section>

</div>

<script>

const COIN_ID = "bitcoin";

const VS_CURRENCY = "usd";

const REFRESH_INTERVAL = 30000;

const DOM = {

logo:document.getElementById("coinLogo"),

name:document.getElementById("coinName"),

symbol:document.getElementById("coinSymbol"),

price:document.getElementById("price"),

change:document.getElementById("change24"),

marketCap:document.getElementById("marketCap"),

rank:document.getElementById("rank"),

fdv:document.getElementById("fdv"),

volume:document.getElementById("volume"),

circulating:document.getElementById("circulating"),

totalSupply:document.getElementById("totalSupply"),

ath:document.getElementById("ath"),

atl:document.getElementById("atl"),

updated:document.getElementById("updated"),

lastBadge:document.getElementById("lastUpdatedBadge"),

chartCanvas:document.getElementById("priceChart")

};

let chart;

let currentDays=1;

const formatter=new Intl.NumberFormat("en-US");

const currencyFormatter=new Intl.NumberFormat("en-US",{

style:"currency",

currency:"USD",

maximumFractionDigits:2

});

function formatNumber(value){

if(value===null||value===undefined)return "-";

return formatter.format(value);

}

function formatCurrency(value){

if(value===null||value===undefined)return "-";

if(value<1){

return "$"+Number(value).toFixed(6);

}

return currencyFormatter.format(value);

}

function formatCompact(value){

if(value===null||value===undefined)return "-";

return new Intl.NumberFormat("en",{

notation:"compact",

maximumFractionDigits:2

}).format(value);

}

function formatDate(value){

return new Date(value).toLocaleString();

}

async function fetchCoin(){

const response=await fetch(

`https://api.coingecko.com/api/v3/coins/${COIN_ID}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=false`

);

return await response.json();

}

async function fetchChart(days){

const response=await fetch(

`https://api.coingecko.com/api/v3/coins/${COIN_ID}/market_chart?vs_currency=${VS_CURRENCY}&days=${days}`

);

return await response.json();

}
    function updateOverview(data){

DOM.logo.src=data.image.large;

DOM.logo.alt=data.name;

DOM.name.textContent=data.name;

DOM.symbol.textContent=data.symbol;

DOM.price.textContent=formatCurrency(

data.market_data.current_price.usd

);

const change=data.market_data.price_change_percentage_24h;

DOM.change.textContent=

(change>=0?"+":"")+

change.toFixed(2)+"%";

DOM.change.className=

"metric-value "+(change>=0?"positive":"negative");

DOM.marketCap.textContent=formatCompact(

data.market_data.market_cap.usd

);

DOM.rank.textContent="#"+data.market_cap_rank;

DOM.fdv.textContent=formatCompact(

data.market_data.fully_diluted_valuation.usd

);

DOM.volume.textContent=formatCompact(

data.market_data.total_volume.usd

);

DOM.circulating.textContent=formatNumber(

Math.round(

data.market_data.circulating_supply

)

);

DOM.totalSupply.textContent=

data.market_data.total_supply

?formatNumber(

Math.round(

data.market_data.total_supply

)

)

:"-";

DOM.ath.textContent=formatCurrency(

data.market_data.ath.usd

);

DOM.atl.textContent=formatCurrency(

data.market_data.atl.usd

);

DOM.updated.textContent=formatDate(

data.last_updated

);

DOM.lastBadge.textContent=

"Updated "+

new Date().toLocaleTimeString();

}

function buildGradient(ctx){

const gradient=ctx.createLinearGradient(

0,

0,

0,

420

);

gradient.addColorStop(

0,

"rgba(59,130,246,.45)"

);

gradient.addColorStop(

1,

"rgba(59,130,246,0)"

);

return gradient;

}

function renderChart(chartData){

const labels=chartData.prices.map(item=>{

const date=new Date(item[0]);

if(currentDays===1){

return date.toLocaleTimeString([],{

hour:"2-digit",

minute:"2-digit"

});

}

return date.toLocaleDateString();

});

const values=chartData.prices.map(

item=>item[1]

);

if(chart){

chart.destroy();

}

const ctx=

DOM.chartCanvas.getContext("2d");

chart=new Chart(ctx,{

type:"line",

data:{

labels,

datasets:[{

data:values,

borderWidth:3,

borderColor:"#3b82f6",

backgroundColor:buildGradient(ctx),

fill:true,

tension:.35,

pointRadius:0,

pointHoverRadius:4

}]

},

options:{

responsive:true,

maintainAspectRatio:false,

interaction:{

mode:"index",

intersect:false

},

plugins:{

legend:{

display:false

},

tooltip:{

displayColors:false,

backgroundColor:"#182235",

titleColor:"#fff",

bodyColor:"#fff",

padding:12,

callbacks:{

label(context){

return formatCurrency(

context.raw

);

}

}

}

},

scales:{

x:{

grid:{

display:false

},

ticks:{

color:"#94a3b8"

}

},

y:{

grid:{

color:"rgba(148,163,184,.08)"

},

ticks:{

color:"#94a3b8",

callback(value){

return formatCompact(value);

}

}

}

}

}

});

}
    async function loadDashboard(){

try{

const [coinData,chartData]=await Promise.all([

fetchCoin(),

fetchChart(currentDays)

]);

updateOverview(coinData);

renderChart(chartData);

}catch(error){

console.error(error);

}

}

function setActiveRange(button){

document

.querySelectorAll(".range-btn")

.forEach(btn=>{

btn.classList.remove("active");

});

button.classList.add("active");

}

document

.querySelectorAll(".range-btn")

.forEach(button=>{

button.addEventListener("click",async()=>{

const days=Number(

button.dataset.days

);

if(days===currentDays){

return;

}

currentDays=days;

setActiveRange(button);

try{

const chartData=

await fetchChart(currentDays);

renderChart(chartData);

}catch(error){

console.error(error);

}

});

});

loadDashboard();

setInterval(

loadDashboard,

REFRESH_INTERVAL

);
    </script>

</body>

</html>
